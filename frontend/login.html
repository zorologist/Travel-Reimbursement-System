<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGAS - Login</title>
    <link rel="stylesheet" href="UI.css">
</head>
<body>
    <header class="top-bar">
        <!-- Ensure your logo image is named correctly or update the src path below -->
        <img src="EGAS.png" alt="EGAS Logo">
    </header>

    <div class="login-container">
        <!-- Logo Section -->
        <div class="logo-area">
            <!-- Ensure your logo image is named correctly or update the src path below -->
            <img src="EGAS.png" alt="EGAS Logo">
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Please sign in to your EGAS account</p>

        <!-- Login Form -->
        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="#" class="forgot-pass">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="footer-text">
            &copy; 2026 EGAS. All rights reserved.
        </div>
    </div>

</body>
</html>
